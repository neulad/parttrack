services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: parttrack
      POSTGRES_USER: parttrack
      POSTGRES_PASSWORD: parttrack
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U parttrack']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://parttrack:parttrack@db:5432/parttrack
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in your .env file}
      NODE_ENV: ${NODE_ENV:-development}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@parttrack.dev}
      APP_URL: ${APP_URL:-http://localhost}
    ports:
      - '4000:4000'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  pg_data:
